
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resume Builder</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container my-4">

<h1 class="text-center mb-4">Resume Builder</h1>

<div class="row">

<!-- Form Section -->
<div class="col-md-5">

<div class="card p-3">

<h4>Personal Information</h4>

<input type="text" id="name" class="form-control mb-2" placeholder="Full Name">

<input type="email" id="email" class="form-control mb-2" placeholder="Email">

<input type="text" id="phone" class="form-control mb-2" placeholder="Phone">

<input type="text" id="college" class="form-control mb-2" placeholder="College">

<input type="text" id="skills" class="form-control mb-2"
placeholder="Skills (comma separated)">

<textarea id="project"
class="form-control mb-2"
placeholder="Project Description"></textarea>

<button class="btn btn-primary w-100"
onclick="generateResume()">
Generate Resume
</button>

</div>

</div>

<!-- Preview Section -->
<div class="col-md-7">

<div class="card p-4" id="resume">

<h2 id="previewName">Your Name</h2>

<p id="previewEmail">Email</p>

<p id="previewPhone">Phone</p>

<hr>

<h4>Education</h4>

<p id="previewCollege"></p>

<h4>Skills</h4>

<p id="previewSkills"></p>

<h4>Projects</h4>

<p id="previewProject"></p>

</div>

<button class="btn btn-success mt-3"
onclick="downloadPDF()">
Download PDF
</button>

</div>

</div>

<hr>

<div class="text-center">
<p>Developed by Asif Ali</p>
<p>Email: asifali25050@gmail.com</p>

<a href="https://digitalheroes.com"
class="btn btn-dark">
Built for Digital Heroes
</a>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script src="app.js"></script>

</body>
</html>
